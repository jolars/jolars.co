on:
  workflow_dispatch:
  push:
    branches: [main]

name: Quarto Publish

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}

      # cachix-action self-installs via `nix-env`, so it must run before the
      # devenv install below: `nix profile install` migrates the default
      # profile to the new format, which `nix-env` then refuses to use.
      - uses: cachix/cachix-action@v17
        with:
          name: jolars
          # Pull devenv and its deps from the public devenv cache instead of
          # building them; still push our own closure to jolars.
          extraPullNames: devenv
          authToken: "${{ secrets.CACHIX_AUTH_TOKEN }}"

      - name: Install devenv
        run: nix profile install --accept-flake-config nixpkgs#devenv

      - name: Setup Pages
        uses: actions/configure-pages@v6

      # Restore mtimes so Quarto's freeze cache stays valid: freeze keys off
      # source timestamps, and a fresh checkout would otherwise look "newer"
      # than the committed _freeze/ outputs and force re-execution.
      - name: Restore timestamps
        uses: chetan/git-restore-mtime-action@v2

      - name: Render Quarto project
        run: devenv shell -- quarto render

      # SEO/content lint and link checks. Both are advisory: they report into
      # the job summary but never block the deploy (continue-on-error / fail:
      # false), since broken external links are often transient.
      - name: SEO & content lint
        if: always()
        continue-on-error: true
        run: devenv shell -- python3 scripts/seo-lint.py --markdown >> "$GITHUB_STEP_SUMMARY"

      - name: Check links
        if: always()
        continue-on-error: true
        run: devenv shell -- lychee --config lychee.toml './_site/**/*.html'

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Submit sitemap to IndexNow
        uses: bojieyang/indexnow-action@v3
        with:
          sitemap-location: https://jolars.co/sitemap.xml
          key: e9264d49e2784885a750d84f178289c1
          failure-strategy: error

  lighthouse:
    name: Lighthouse Audit
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Audit URLs using Lighthouse
        run: npx unlighthouse-ci --site https://jolars.co --build-static
