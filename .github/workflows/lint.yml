name: Lint

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Install external formatters
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            shfmt \
            clang-format

      - name: Install Air
        uses: posit-dev/setup-air@v1

      - name: Install ruff
        run: |
          pip install ruff

      - uses: jolars/panache-action@v1
