version: "3"

tasks:
  preview:
    desc: Preview documentation site locally
    cmds:
      - quarto preview

  render:
    desc: Render the full site to _site/
    cmds:
      - quarto render

  seo:
    desc: Lint SEO metadata and content (titles, descriptions, alt text, ...)
    cmds:
      - python3 scripts/seo-lint.py

  links:
    desc: Check internal and external links for breakage (needs a rendered _site/)
    cmds:
      - lychee --config lychee.toml './_site/**/*.html'

  lighthouse:
    desc: Run a Lighthouse desktop audit (perf, a11y, best-practices, SEO)
    vars:
      URL: '{{.URL | default "https://jolars.co"}}'
    cmds:
      - mkdir -p .lighthouse
      - >-
        CHROME_PATH="$(command -v chromium)"
        lighthouse "{{.URL}}"
        --preset=desktop
        --output=json --output=html
        --output-path=.lighthouse/report
        --chrome-flags="--headless=new --no-sandbox --disable-gpu"
        --only-categories=performance,accessibility,best-practices,seo
        --quiet
      - >-
        node -e 'const r=require("./.lighthouse/report.report.json");
        for(const k in r.categories)
        console.log(r.categories[k].title.padEnd(16),
        Math.round(r.categories[k].score*100));'

  check:
    desc: Render the site, then run the SEO lint and link checks
    deps: [render]
    cmds:
      - task: seo
      - task: links
